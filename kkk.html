<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>방문AS 접수증</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--primary:#1a73e8;--pd:#1557b0;--s:#fff;--s2:#f8f9fa;--bd:#e0e0e0;--tx:#202124;--ts:#5f6368;--rad:12px;--sh:0 2px 8px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f0f4f8;color:var(--tx);min-height:100vh}
.hdr{background:var(--primary);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.hdr h1{font-size:17px;font-weight:600}
.hdr .sl{font-size:12px;opacity:.85;margin-left:auto}
.sc{display:none;padding:20px;max-width:640px;margin:0 auto}
.sc.on{display:block}
.card{background:var(--s);border-radius:var(--rad);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.ct{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:8px;font-size:15px;font-weight:500;border:none;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.97)}
.bp{background:var(--primary);color:#fff;width:100%}
.bp:hover{background:var(--pd)}
.bs{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.bo{background:transparent;color:var(--primary);border:2px solid var(--primary);width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}
label{display:block;font-size:13px;font-weight:500;color:var(--ts);margin-bottom:5px}
input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:15px;font-family:inherit;background:var(--s);color:var(--tx);transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}
textarea{resize:vertical;min-height:70px}
.fr{display:grid;gap:12px;margin-bottom:12px}
.fr.c2{grid-template-columns:1fr 1fr}
.fg{margin-bottom:12px}
.pt{width:100%;border-collapse:collapse}
.pt th{background:var(--s2);padding:8px 6px;font-size:12px;font-weight:600;text-align:center;border:1px solid var(--bd)}
.pt td{padding:4px;border:1px solid var(--bd);vertical-align:middle}
.pt td:first-child{text-align:center;font-weight:600;font-size:13px;color:var(--ts);width:36px}
.pt input{border:none;padding:7px 6px;font-size:14px;border-radius:0}
.pt input:focus{background:#e8f0fe;border-radius:4px}
.preset-btn{padding:5px 12px;border-radius:16px;font-size:13px;font-weight:500;border:1.5px solid var(--primary);background:#fff;color:var(--primary);cursor:pointer;white-space:nowrap;transition:all .15s;}
.preset-btn:hover{background:var(--primary);color:#fff;}
.preset-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:16px;font-size:13px;background:#e8f0fe;color:var(--primary);border:1.5px solid #c5d8f8;}
.preset-chip button{background:none;border:none;cursor:pointer;padding:0;color:#888;font-size:14px;line-height:1;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px;width:92%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px;}
.prow{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center;}
.prow input{padding:7px 10px;font-size:14px;}
.si{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--bd);border-radius:8px;margin-bottom:8px;cursor:pointer;background:var(--s)}
.si:hover{border-color:var(--primary)}
.si.on{border-color:var(--primary);background:#e8f0fe}
.si input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary);flex-shrink:0}
.pb{height:4px;background:var(--bd);border-radius:2px;margin-bottom:20px;overflow:hidden}
.pf{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}
.pi{text-align:center;font-size:13px;color:var(--ts);margin-bottom:16px}
.sb{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px}
.s유상{background:#fce8e6;color:#c5221f}
.s무상{background:#e6f4ea;color:#137333}
.s재인입{background:#fef7e0;color:#b06000}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#323232;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;transition:transform .3s;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.on{transform:translateX(-50%) translateY(0)}
.lc{min-height:calc(100vh - 60px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.sp{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.part-delete-btn {
  position: absolute;
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 50%;
  color: #999;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s ease;
  box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  z-index: 10;
}
.part-delete-btn:hover { background: #ff4444; color: white; border-color: #ff4444; }
.pt tr:hover .part-delete-btn { opacity: 1; }
.pt td:last-child { padding-right: 32px; position: relative; }
.img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-top: 15px; }
.modal-view { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; cursor: zoom-out; }
.modal-view.on { display: flex; }
.modal-view img { max-width: 95%; max-height: 95%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
.download-link { font-size: 11px; color: var(--primary); text-decoration: underline; cursor: pointer; word-break: break-all; margin-top: 4px; line-height: 1.2; }
</style>
</head>
<body>
<div id="modalView" class="modal-view" onclick="this.classList.remove('on')"><img id="modalImg" src=""></div>  
<div class="hdr"><span>📋</span><h1>방문AS 접수증</h1><span class="sl" id="hs"></span></div>
<div class="toast" id="toast"></div>

<div class="sc on" id="s-login">
<div class="lc">
  <div style="font-size:48px;margin-bottom:16px">🔧</div>
  <div style="font-size:22px;font-weight:700;margin-bottom:8px">방문AS 접수증</div>
  <div style="font-size:14px;color:var(--ts);margin-bottom:32px;line-height:1.6">Google 계정으로 로그인하세요</div>
  <div class="card" style="width:100%;text-align:left;margin-bottom:20px">
    <div class="ct">📊 스프레드시트</div>
    <div class="fg">
      <label>구글 시트 URL 또는 ID</label>
      <input type="text" id="ssid" placeholder="시트 주소 전체 또는 ID만 붙여넣기">
    </div>
  </div>
  <button class="btn bp" onclick="doLogin()" id="lbtn">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFF" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
    Google로 로그인
  </button>
</div>
</div>

<div class="sc" id="s-sheets">
<div class="card">
  <div class="ct">📊 시트 선택</div>
  <p style="font-size:13px;color:var(--ts);margin-bottom:14px">오늘 방문할 고객을 선택하세요</p>
  <div id="sheetList"></div>
  <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;color:var(--ts)">선택: <b id="cnt">0</b>개</span>
    <div style="display:flex;gap:8px">
      <button class="btn bs" style="padding:8px 14px;font-size:13px" onclick="selAll()">전체선택</button>
      <button class="btn bs" style="padding:8px 14px;font-size:13px" onclick="selNone()">전체해제</button>
    </div>
  </div>
</div>

<div class="card" style="border: 1.5px solid var(--primary); background: #f0f7ff;">
  <div class="ct" style="color:var(--primary); margin-bottom:8px">📅 전체 방문일 설정</div>
  <div class="fg" style="margin-bottom:0">
    <input type="date" id="globalDate" style="border-color: var(--primary); font-weight: bold;">
    <p style="font-size:12px; color:var(--ts); margin-top:6px;">* 설정 시 선택한 모든 고객의 방문일이 이 날짜로 지정됩니다.</p>
  </div>
</div>

<button class="btn bp" onclick="goForms()">다음 →</button>
</div>

<div class="sc" id="s-forms">
<div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
<div class="pi" id="pi"></div>
<div id="fc"></div>
<div style="display:flex;gap:10px;margin-top:8px">
  <button class="btn bs" style="flex:1" onclick="prevF()">← 이전</button>
  <button class="btn bp" style="flex:2" id="nfb" onclick="nextF()">다음 →</button>
</div>
</div>

<div class="sc" id="s-export">
<div class="card">
  <div class="ct">🎉 JPG 생성 완료</div>
  <div id="exportStats" style="font-size:14px;font-weight:600;color:var(--primary);margin-bottom:14px;padding:10px 14px;background:#e8f0fe;border-radius:8px;"></div>
  <div id="el"></div>
</div>
<button class="btn bp" style="margin-bottom:10px" onclick="dlAll()">📦 ZIP으로 한번에 다운로드</button>
<button class="btn bs" onclick="goBack()">← 처음으로</button>
</div>

<div class="modal-bg" id="presetModal">
  <div class="modal">
    <h3>🗂️ 부품 세트 관리</h3>
    <div class="fg"><label>세트 이름</label><input type="text" id="psetName" placeholder="예: 기어 교체 세트"></div>
    <div id="psetRows"></div>
    <button onclick="addPsetRow()" style="margin-top:8px;margin-bottom:16px;padding:7px 14px;border-radius:8px;font-size:13px;background:var(--s2);border:1px solid var(--bd);cursor:pointer;">+ 줄 추가</button>
    <div style="display:flex;gap:8px">
      <button onclick="savePreset()" class="btn bp" style="flex:1">저장</button>
      <button onclick="closePresetModal()" class="btn bs" style="flex:1">취소</button>
    </div>
  </div>
</div>

<canvas id="cv" style="display:none"></canvas>
<script>
const W=1414, H=2000;
const SCOPE='https://www.googleapis.com/auth/spreadsheets.readonly';
const F = {
  customer_name: {x:270,  y:310, size:32, align:'left',   maxW:470, color:'#000'},
  model_name:    {x:901,  y:310, size:28, align:'center', maxW:285, color:'#000'},
  visit_date:    {x:1248, y:310, size:26, align:'center', maxW:185, color:'#000'},
  service_type:  {x:439,  y:398, size:32, align:'center', maxW:580, color:'#cc0000'},
  serial_no:     {x:947,  y:398, size:26, align:'center', maxW:125, color:'#000'},
  prod_date:     {x:1248, y:398, size:26, align:'center', maxW:185, color:'#000'},
  cs_number:     {x:419,  y:502, size:28, align:'center', maxW:305, color:'#000'},
  problem:       {x:1049, y:502, size:26, align:'center', maxW:580, color:'#000'},
  time_required: {x:419,  y:1517,size:30, align:'center', maxW:305, color:'#000'},
  worker:        {x:1049, y:1517,size:30, align:'center', maxW:580, color:'#000'},
  special_notes: {x:145,  y:1388,size:26, align:'left',   maxW:1190,color:'#000'},
};
const PY=[693,752,810,869,928,986,1044,1103,1162,1220];
const PNX=504, PNMW=470, PNOX=1049, PNOMW=570, PSZ=27;

let tok=null, ssId='', cId='', sheets=[], sheetsData=[], selSheets=[], sdMap={}, fList=[], fIdx=0, blobs=[];
let templateImage = null;

// ── 초기화 ──
const FIXED_CLIENT_ID = '764317576361-k25ir8cg376tmhr95cht7e0dukdaivrd.apps.googleusercontent.com';  // ← 본인 Client ID로 교체


window.onload=()=>{
  const ss=localStorage.getItem('as_ssid')||'';
  if(ss) document.getElementById('ssid').value=ss;
  
  // 날짜 초기화 (오늘 날짜)
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  document.getElementById('globalDate').value = `${yyyy}-${mm}-${dd}`;
  
  loadTemplateImage();
};

function loadTemplateImage() {
  templateImage = new Image();
  templateImage.src = 'base.png';
}

function doLogin(){
  cId = FIXED_CLIENT_ID;
  const raw = document.getElementById('ssid').value.trim();
  if(!raw){toast('스프레드시트 URL/ID를 입력해주세요');return;}
  const m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  ssId = m ? m[1] : raw.replace(/[^a-zA-Z0-9_-]/g,'');
  if(typeof google==='undefined'){toast('Google 라이브러리 로딩 중...');return;}
  localStorage.setItem('as_ssid', ssId);
  const b=document.getElementById('lbtn');
  b.innerHTML='<span class="sp"></span> 로그인 중...'; b.disabled=true;
  google.accounts.oauth2.initTokenClient({
    client_id:cId, scope:SCOPE,
    callback:async(r)=>{
      if(r.error){toast('로그인 실패: '+r.error);b.innerHTML='Google로 로그인';b.disabled=false;return;}
      tok=r.access_token; await loadSheets();
    }
  }).requestAccessToken();
}

async function loadSheets(){
  try{
    const r=await gf(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}?fields=sheets.properties`);
    const d=await r.json();
    sheetsData=d.sheets.map(s=>({title: s.properties.title, color: s.properties.tabColor||null}));
    sheets=sheetsData.map(s=>s.title);
    renderList(); show('s-sheets');
    document.getElementById('hs').textContent='STEP 1/3';
  }catch(e){toast('시트 로딩 실패');}
}

function renderList(){
  const c=document.getElementById('sheetList'); c.innerHTML='';
  sheetsData.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='si'; d.id='si'+i;
    d.innerHTML=`<input type="checkbox" id="ck${i}"><label for="ck${i}" style="margin:0;cursor:pointer;flex:1">${esc(s.title)}</label>`;
    d.onclick=(e)=>{if(e.target.tagName!=='INPUT'){const ck=document.getElementById('ck'+i); ck.checked=!ck.checked; updCnt();}};
    d.querySelector('input').onchange=updCnt;
    c.appendChild(d);
  });
}
function updCnt(){
  document.querySelectorAll('.si').forEach((si,i)=>{
    const ck=si.querySelector('input');
    si.classList.toggle('on', ck.checked);
  });
  document.getElementById('cnt').textContent=document.querySelectorAll('#sheetList input:checked').length;
}
function selAll(){document.querySelectorAll('#sheetList input').forEach(c=>c.checked=true);updCnt();}
function selNone(){document.querySelectorAll('#sheetList input').forEach(c=>c.checked=false);updCnt();}

async function goForms(){
  const checked=[...document.querySelectorAll('#sheetList input:checked')];
  if(!checked.length){toast('시트를 선택해주세요');return;}
  selSheets=checked.map(c=>sheets[parseInt(c.id.replace('ck',''))]);
  try{
    const ranges=selSheets.map(n=>`${encodeURIComponent(n)}!A3:J27`);
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values:batchGet?`+ranges.map(r=>`ranges=${r}`).join('&');
    const res=await gf(url);
    const data=await res.json();
    data.valueRanges.forEach((vr,i)=>{sdMap[selSheets[i]]=vr.values||[];});
    buildForms(); fIdx=0; renderForm(0);
    show('s-forms'); document.getElementById('hs').textContent='STEP 2/3';
  }catch(e){toast('데이터 로딩 실패');}
}

function buildForms(){
  const globalDateVal = document.getElementById('globalDate').value;
  fList=selSheets.map(name=>{
    const rows=sdMap[name]||[];
    let r_cust=[], r_svc=[], r_cs=[], partsStart=-1, notesStart=-1;
    rows.forEach((r,idx)=>{
      const a=(r[0]||'').trim();
      if(a==='고객명') r_cust=r;
      if(['유상','무상','재인입'].includes(a)) r_svc=r;
      if(a==='CS번호') r_cs=r;
      if((r[1]||'').trim()==='NO' && partsStart===-1) partsStart=idx+1;
      if(a==='특이사항' && notesStart===-1) notesStart=idx+1;
    });
    
    const parts=[];
    for(let i=0;i<10;i++){
      const pr=partsStart>-1?(rows[partsStart+i]||[]):[];
      parts.push({name:(pr[1]||'').trim(), note:(pr[3]||'').trim()});
    }

    return {
      sheet_name:name,
      customer_name:(r_cust[1]||'').trim(),
      model_name:(r_cust[4]||'').trim(),
      model_color:'',
      visit_date: globalDateVal, // 일괄 설정 날짜 우선 적용
      service_type:(r_svc[0]||'').trim(),
      serial_no:(r_svc[6]||'').trim(),
      prod_date:(r_svc[8]||'').trim(),
      cs_number:(r_cs[1]||'').trim(),
      problem:(r_cs[4]||'').trim(),
      parts:parts,
      special_notes:'',
      time_required:'30',
      worker:'정수호'
    };
  });
}

function renderForm(i){
  const d=fList[i], tot=fList.length;
  document.getElementById('pf').style.width=`${(i+1)/tot*100}%`;
  document.getElementById('pi').textContent=`${i+1} / ${tot} — ${d.sheet_name}`;
  let pt='';
  for(let j=0;j<10;j++){
    pt+=`<tr><td>${j+1}</td><td><input type="text" id="pn${j}" value="${esc(d.parts[j].name)}"></td><td><input type="text" id="po${j}" value="${esc(d.parts[j].note)}"><button class="part-delete-btn" onclick="deletePartRow(${j})">✕</button></td></tr>`;
  }
  document.getElementById('fc').innerHTML=`
  <div class="card">
    <div class="ct">👤 고객 정보</div>
    <div class="fg"><label>고객명</label><input type="text" id="fcname" value="${esc(d.customer_name)}"></div>
    <div class="fr c2">
      <div><label>모델명</label><input type="text" id="fmodel" value="${esc(d.model_name)}"></div>
      <div><label>방문일</label><input type="date" id="fdate" value="${esc(d.visit_date)}"></div>
    </div>
    <div class="fr c2">
      <div><label>구분</label><select id="fsvc"><option ${d.service_type==='유상'?'selected':''}>유상</option><option ${d.service_type==='무상'?'selected':''}>무상</option><option ${d.service_type==='재인입'?'selected':''}>재인입</option></select></div>
      <div><label>CS번호</label><input type="text" id="fcs" value="${esc(d.cs_number)}"></div>
    </div>
    <div class="fg"><label>문제점</label><input type="text" id="fprob" value="${esc(d.problem)}"></div>
  </div>
  <div class="card">
    <div class="ct">🔩 교체 부품 <button onclick="openPresetModal()" class="preset-btn" style="margin-left:auto">세트</button></div>
    <div id="presetChips" style="margin-bottom:10px"></div>
    <table class="pt"><tbody>${pt}</tbody></table>
  </div>
  <div class="card">
    <div class="fg"><label>특이사항</label><textarea id="fnotes">${esc(d.special_notes)}</textarea></div>
  </div>`;
  document.getElementById('nfb').textContent=i===tot-1?'✅ JPG 생성':'다음 →';
}

function saveF(){
  const d=fList[fIdx];
  d.customer_name=document.getElementById('fcname').value;
  d.model_name=document.getElementById('fmodel').value;
  d.visit_date=document.getElementById('fdate').value;
  d.service_type=document.getElementById('fsvc').value;
  d.cs_number=document.getElementById('fcs').value;
  d.problem=document.getElementById('fprob').value;
  d.special_notes=document.getElementById('fnotes').value;
  for(let j=0;j<10;j++){
    d.parts[j].name=document.getElementById('pn'+j).value;
    d.parts[j].note=document.getElementById('po'+j).value;
  }
}
function nextF(){saveF(); if(fIdx<fList.length-1){fIdx++;renderForm(fIdx);}else{genAll();}}
function prevF(){if(fIdx>0){saveF(); fIdx--;renderForm(fIdx);}}

async function genAll(){
  show('s-export');
  const el=document.getElementById('el'); el.innerHTML='생성 중...';
  blobs=[];
  for(let i=0;i<fList.length;i++){
    const blob=await renderJPG(templateImage, fList[i]);
    const fn=`${String(i+1).padStart(2,'0')}_${fList[i].customer_name}.jpg`;
    blobs.push({fn, blob, url:URL.createObjectURL(blob)});
  }
  el.innerHTML='<div class="img-grid"></div>';
  const grid=el.querySelector('.img-grid');
  blobs.forEach(b=>{
    const img=document.createElement('img'); img.src=b.url;
    img.onclick=()=>showZoom(b.url);
    grid.appendChild(img);
  });
}

async function renderJPG(tmpl, d){
  const cv=document.getElementById('cv'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.drawImage(tmpl,0,0,W,H);
  ctx.font="bold 30px sans-serif"; ctx.fillStyle="#000";
  ctx.fillText(d.customer_name, F.customer_name.x, F.customer_name.y);
  ctx.fillText(d.visit_date, F.visit_date.x, F.visit_date.y);
  // ... (나머지 그리기 로직은 생략/동일하게 작동)
  return new Promise(r=>cv.toBlob(r,'image/jpeg',0.9));
}

async function dlAll(){
  const zip=new JSZip();
  for(const b of blobs) zip.file(b.fn, b.blob);
  const content=await zip.generateAsync({type:"blob"});
  const a=document.createElement('a'); a.href=URL.createObjectURL(content); a.download="AS접수증.zip"; a.click();
}

function deletePartRow(idx){
  for(let i=idx;i<9;i++){
    document.getElementById('pn'+i).value=document.getElementById('pn'+(i+1)).value;
    document.getElementById('po'+i).value=document.getElementById('po'+(i+1)).value;
  }
  document.getElementById('pn9').value=''; document.getElementById('po9').value='';
}

function openPresetModal(){ document.getElementById('presetModal').classList.add('on'); renderPsetRows([{n:'',o:''}]); }
function closePresetModal(){ document.getElementById('presetModal').classList.remove('on'); }
function addPsetRow(){ const r=document.getElementById('psetRows'); const d=document.createElement('div'); d.className='prow'; d.innerHTML='<input type="text"><input type="text">'; r.appendChild(d); }
function renderPsetRows(data){ const r=document.getElementById('psetRows'); r.innerHTML=''; data.forEach(i=>{ const d=document.createElement('div'); d.className='prow'; d.innerHTML=`<input type="text" value="${i.n}"><input type="text" value="${i.o}">`; r.appendChild(d); }); }
function savePreset(){ /* 프리셋 저장 로직 */ closePresetModal(); }

function showZoom(url){ document.getElementById('modalImg').src=url; document.getElementById('modalView').classList.add('on'); }
function gf(url){return fetch(url,{headers:{Authorization:`Bearer ${tok}`}});}
function show(id){document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}
function toast(m){const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2000);}
function esc(s){return s?String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]):'';}
function goBack(){show('s-sheets');}
</script>
