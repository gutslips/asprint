<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>방문AS 접수증</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{--primary:#1a73e8;--pd:#1557b0;--s:#fff;--s2:#f8f9fa;--bd:#e0e0e0;--tx:#202124;--ts:#5f6368;--rad:12px;--sh:0 2px 8px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f0f4f8;color:var(--tx);min-height:100vh}
.hdr{background:var(--primary);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.hdr h1{font-size:17px;font-weight:600}
.hdr .sl{font-size:12px;opacity:.85;margin-left:auto}
.sc{display:none;padding:20px;max-width:640px;margin:0 auto}
.sc.on{display:block}
.card{background:var(--s);border-radius:var(--rad);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.ct{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:8px;font-size:15px;font-weight:500;border:none;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.97)}
.bp{background:var(--primary);color:#fff;width:100%}
.bp:hover{background:var(--pd)}
.bs{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.bo{background:transparent;color:var(--primary);border:2px solid var(--primary);width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}
label{display:block;font-size:13px;font-weight:500;color:var(--ts);margin-bottom:5px}
input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:15px;font-family:inherit;background:var(--s);color:var(--tx);transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}
textarea{resize:vertical;min-height:70px}
.fr{display:grid;gap:12px;margin-bottom:12px}
.fr.c2{grid-template-columns:1fr 1fr}
.fg{margin-bottom:12px}
.pt{width:100%;border-collapse:collapse}
.pt th{background:var(--s2);padding:8px 6px;font-size:12px;font-weight:600;text-align:center;border:1px solid var(--bd)}
.pt td{padding:4px;border:1px solid var(--bd);vertical-align:middle}
.pt td:first-child{text-align:center;font-weight:600;font-size:13px;color:var(--ts);width:36px}
.pt input{border:none;padding:7px 6px;font-size:14px;border-radius:0}
.pt input:focus{background:#e8f0fe;border-radius:4px}
.si{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--bd);border-radius:8px;margin-bottom:8px;cursor:pointer;background:var(--s)}
.si:hover{border-color:var(--primary)}
.si.on{border-color:var(--primary);background:#e8f0fe}
.si input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary);flex-shrink:0}
.pb{height:4px;background:var(--bd);border-radius:2px;margin-bottom:20px;overflow:hidden}
.pf{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}
.pi{text-align:center;font-size:13px;color:var(--ts);margin-bottom:16px}
.sb{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.s유상{background:#fce8e6;color:#c5221f}
.s무상{background:#e6f4ea;color:#137333}
.s재인입{background:#fef7e0;color:#b06000}
.ei{display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;background:var(--s2);margin-bottom:8px;border:1px solid var(--bd)}
.ei .fn{font-size:13px;flex:1;word-break:break-all}
.ei a{color:var(--primary);font-size:13px;font-weight:500;text-decoration:none;white-space:nowrap}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#323232;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;transition:transform .3s;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.on{transform:translateX(-50%) translateY(0)}
.lc{min-height:calc(100vh - 60px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.sp{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.dbg{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px;font-size:11px;font-family:monospace;max-height:200px;overflow-y:auto;margin-top:8px;white-space:pre-wrap;word-break:break-all;display:none}
</style>
</head>
<body>
<div class="hdr"><span>📋</span><h1>방문AS 접수증</h1><span class="sl" id="hs"></span></div>
<div class="toast" id="toast"></div>

<!-- 로그인 -->
<div class="sc on" id="s-login">
<div class="lc">
  <div style="font-size:48px;margin-bottom:16px">🔧</div>
  <div style="font-size:22px;font-weight:700;margin-bottom:8px">방문AS 접수증</div>
  <div style="font-size:14px;color:var(--ts);margin-bottom:32px;line-height:1.6">Google 계정으로 로그인하세요</div>
  <div class="card" style="width:100%;text-align:left;margin-bottom:20px">
    <div class="ct">⚙️ 설정</div>
    <div class="fg"><label>OAuth Client ID</label><input type="text" id="cid" placeholder="123456789-xxxx.apps.googleusercontent.com"></div>
    <div class="fg"><label>스프레드시트 ID</label><input type="text" id="ssid" placeholder="/d/ 뒤 ~ /edit 앞"></div>
  </div>
  <button class="btn bp" onclick="doLogin()" id="lbtn">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFF" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
    Google로 로그인
  </button>
</div>
</div>

<!-- 시트 선택 -->
<div class="sc" id="s-sheets">
<div class="card">
  <div class="ct">📊 시트 선택</div>
  <p style="font-size:13px;color:var(--ts);margin-bottom:14px">오늘 방문할 고객을 선택하세요</p>
  <div id="sheetList"></div>
  <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;color:var(--ts)">선택: <b id="cnt">0</b>개</span>
    <div style="display:flex;gap:8px">
      <button class="btn bs" style="padding:8px 14px;font-size:13px" onclick="selAll()">전체선택</button>
      <button class="btn bs" style="padding:8px 14px;font-size:13px" onclick="selNone()">전체해제</button>
    </div>
  </div>
</div>
<button class="btn bp" onclick="goForms()">다음 →</button>
</div>

<!-- 폼 입력 -->
<div class="sc" id="s-forms">
<div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
<div class="pi" id="pi"></div>
<div id="fc"></div>
<div style="display:flex;gap:10px;margin-top:8px">
  <button class="btn bs" style="flex:1" onclick="prevF()">← 이전</button>
  <button class="btn bp" style="flex:2" id="nfb" onclick="nextF()">다음 →</button>
</div>
</div>

<!-- 내보내기 -->
<div class="sc" id="s-export">
<div class="card">
  <div class="ct">🎉 JPG 생성 완료</div>
  <div id="el"></div>
</div>
<button class="btn bo" style="margin-bottom:12px" onclick="dlAll()">⬇️ 전체 다운로드</button>
<button class="btn bs" onclick="goBack()">← 처음으로</button>
</div>

<canvas id="cv" style="display:none"></canvas>

// ── 초기화 ──
window.onload=()=>{
  const sc=localStorage.getItem('as_cid')||'';
  const ss=localStorage.getItem('as_ssid')||'';
  if(sc) document.getElementById('cid').value=sc;
  if(ss) document.getElementById('ssid').value=ss;
};

// ── 로그인 ──
function doLogin(){
  cId=document.getElementById('cid').value.trim();
  ssId=document.getElementById('ssid').value.trim();
  if(!cId){toast('Client ID를 입력해주세요');return;}
  if(!ssId){toast('스프레드시트 ID를 입력해주세요');return;}
  const m=ssId.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m) ssId=m[1];
  if(typeof google==='undefined'||!google.accounts){toast('Google 라이브러리 로딩 중... 잠시 후 다시 시도');return;}
  localStorage.setItem('as_cid',cId); localStorage.setItem('as_ssid',ssId);
  const b=document.getElementById('lbtn');
  b.innerHTML='<span class="sp"></span> 로그인 중...'; b.disabled=true;
  google.accounts.oauth2.initTokenClient({
    client_id:cId, scope:SCOPE,
    callback:async(r)=>{
      if(r.error){toast('로그인 실패: '+r.error);b.innerHTML='Google로 로그인';b.disabled=false;return;}
      tok=r.access_token; await loadSheets();
    }
  }).requestAccessToken();
}

async function loadSheets(){
  try{
    const r=await gf(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}?fields=sheets.properties.title`);
    const d=await r.json();
    if(d.error) throw new Error(d.error.message);
    sheets=d.sheets.map(s=>s.properties.title);
    renderList(); show('s-sheets');
    document.getElementById('hs').textContent='STEP 1/3';
    toast(`시트 ${sheets.length}개 로드 완료`);
  }catch(e){
    toast('시트 로딩 실패: '+e.message);
    const b=document.getElementById('lbtn');
    b.innerHTML='Google로 로그인'; b.disabled=false;
  }
}

// ── 시트 목록 ──
function renderList(){
  const c=document.getElementById('sheetList'); c.innerHTML='';
  sheets.forEach((n,i)=>{
    const d=document.createElement('div');
    d.className='si'; d.id='si'+i;
    d.innerHTML=`<input type="checkbox" id="ck${i}" onchange="updCnt()">
      <label for="ck${i}" style="margin:0;font-size:15px;font-weight:500;cursor:pointer;flex:1">${esc(n)}</label>`;
    d.onclick=e=>{if(e.target.tagName!=='INPUT'){document.getElementById('ck'+i).click();}};
    c.appendChild(d);
  });
  updCnt();
}
function updCnt(){
  const n=document.querySelectorAll('#sheetList input:checked').length;
  document.getElementById('cnt').textContent=n;
  sheets.forEach((_,i)=>{
    const ck=document.getElementById('ck'+i), si=document.getElementById('si'+i);
    if(ck&&si) si.classList.toggle('on',ck.checked);
  });
}
function selAll(){document.querySelectorAll('#sheetList input').forEach(c=>c.checked=true);updCnt();}
function selNone(){document.querySelectorAll('#sheetList input').forEach(c=>c.checked=false);updCnt();}

async function goForms(){
  const checked=[...document.querySelectorAll('#sheetList input:checked')];
  if(!checked.length){toast('시트를 1개 이상 선택해주세요');return;}
  selSheets=checked.map(c=>sheets[parseInt(c.id.replace('ck',''))]);
  toast('데이터 불러오는 중...');
  try{
    // A3:J27 — 더 넓은 범위로 읽어서 위치 차이에 대응
    const ranges=selSheets.map(n=>`${encodeURIComponent(n)}!A3:J27`);
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values:batchGet?`
      +ranges.map(r=>`ranges=${r}`).join('&')+'&valueRenderOption=FORMATTED_VALUE';
    const res=await gf(url);
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    data.valueRanges.forEach((vr,i)=>{sdMap[selSheets[i]]=vr.values||[];});
    buildForms(); fIdx=0; renderForm(0);
    show('s-forms'); document.getElementById('hs').textContent='STEP 2/3';
  }catch(e){toast('데이터 로딩 실패: '+e.message);}
}

function buildForms(){
  const today=new Date();
  const td=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  fList=selSheets.map(name=>{
    const rows=sdMap[name]||[];
    // A3:J27 읽으면 rows[0]=row3, rows[2]=row5(고객명)
    // 디버그 로그 분석 결과:
    // rows[3] = 고객명/모델명/방문일 행 (A="고객명", B=값, E=모델명, G="방문일", H=값)
    // rows[4] = 유무상/Sr.No/생산일 행 (A=유무상값, E="Sr.No.", F=값, G="생산일", H=값)
    // rows[5] = CS번호/문제점 행 (B=CS값, E=문제점값)
    const r_cust = rows[3]||[];  // 고객명 행
    const r_svc  = rows[4]||[];  // 유무상 행
    const r_cs   = rows[5]||[];  // CS번호 행
    const r25    = rows[22]||[]; // 소요시간 행

    console.log(`[${name}] 파싱:`, JSON.stringify({r_cust,r_svc,r_cs,r25}));

    // 고객명: B열 (index 1)
    const customer_name = (r_cust[1]||'').trim();
    
    // 모델명: E열 (index 4)
    const model_name = (r_cust[4]||'').trim();
    
    // 방문일: H열 (index 7) — 비어있으면 오늘
    const visit_date = (r_cust[7]||r_cust[8]||'').trim() || td;
    
    // 유상/무상/재인입: A열 (index 0)
    const service_type = (r_svc[0]||'').trim();
    
    // Sr.No: F열 (index 5)
    const serial_no = (r_svc[5]||'').trim();
    
    // 생산일: H열 (index 7)
    const prod_date = (r_svc[7]||r_svc[8]||'').trim();
    
    // CS번호: B열 (index 1)
    const cs_number = (r_cs[1]||'').trim();
    
    // 문제점: E열 (index 4)
    const problem = (r_cs[4]||r_cs[5]||r_cs[6]||'').trim();

    // parts: rows[7~16] = row10~19
    const parts=[];
    for(let i=0;i<10;i++){
      const pr=rows[7+i]||[];
      // 부품명: B열=pr[1], 비고: D열=pr[3]
      parts.push({name:(pr[1]||'').trim(), note:(pr[3]||'').trim()});
    }

    // 특이사항 내용: rows[19]=row22, rows[20]=row23 (헤더인 rows[18]=row21 제외)
    const n1=(rows[19]||[]).filter((_,i)=>i>0).join(' ').trim(); // A열(라벨) 제외
    const n2=(rows[20]||[]).filter((_,i)=>i>0).join(' ').trim();
    const special_notes=[n1,n2].filter(Boolean).join('\n');

    // 소요시간/작업자: row25 (rows[22])
    const time_required=(r25[1]||r25[2]||'30').trim()||'30';
    const worker=(r25[4]||r25[5]||'정수호').trim()||'정수호';

    return {sheet_name:name,customer_name,model_name,model_color:'',visit_date,service_type,serial_no,prod_date,cs_number,problem,parts,special_notes,time_required,worker};
  });
}

// ── 폼 렌더링 ──

  const sc=`s${d.service_type}`;
  document.getElementById('fc').innerHTML=`
  <div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <span style="font-size:20px">👤</span>
      <div>
        <div style="font-size:18px;font-weight:700">${esc(d.customer_name)||'(고객명 없음)'}</div>
        <div style="font-size:13px;color:var(--ts)">${esc(d.cs_number)} · <span class="sb ${sc}">${esc(d.service_type)||'-'}</span></div>
      </div>
    </div>
    <div class="fg"><label>고객명</label><input type="text" id="fcname" value="${esc(d.customer_name)}" placeholder="고객명 직접 입력 가능"></div>
    <div class="fr c2">
      <div><label>모델명</label><input type="text" id="fmodel" value="${esc(d.model_name)}"></div>
      <div><label>색상</label><input type="text" id="fcolor" value="${esc(d.model_color)}" placeholder="예: 실버, 블랙"></div>
    </div>
    <div class="fr c2">
      <div><label>방문일</label><input type="date" id="fdate" value="${esc(d.visit_date)}"></div>
      <div><label>유상/무상/재인입</label>
        <select id="fsvc">
          <option value="유상" ${d.service_type==='유상'?'selected':''}>유상</option>
          <option value="무상" ${d.service_type==='무상'?'selected':''}>무상</option>
          <option value="재인입" ${d.service_type==='재인입'?'selected':''}>재인입</option>
        </select>
      </div>
    </div>
    <div class="fr c2">
      <div><label>Sr.No</label><input type="text" id="fsno" value="${esc(d.serial_no)}"></div>
      <div><label>생산일</label><input type="text" id="fprod" value="${esc(d.prod_date)}"></div>
    </div>
    <div class="fg"><label>CS번호</label><input type="text" id="fcs" value="${esc(d.cs_number)}"></div>
    <div class="fg"><label>문제점</label><input type="text" id="fprob" value="${esc(d.problem)}"></div>
  </div>
  <div class="card">
    <div class="ct">🔩 교체 내역</div>
    <table class="pt"><thead><tr><th>NO</th><th>부품명</th><th>비고</th></tr></thead><tbody>${pt}</tbody></table>
  </div>
  <div class="card">
    <div class="ct">📝 기타</div>
    <div class="fg"><label>특이사항</label><textarea id="fnotes" rows="3">${esc(d.special_notes)}</textarea></div>
    <div class="fr c2">
      <div><label>소요시간(분)</label><input type="text" id="ftime" value="${esc(d.time_required)}"></div>
      <div><label>작업자</label><input type="text" id="fwrk" value="${esc(d.worker)}"></div>

  document.getElementById('nfb').textContent=i===tot-1?'✅ JPG 생성':'다음 →';
  document.querySelector('#s-forms .bs').style.opacity=i===0?'0.3':'1';

function saveF(){
  const d=fList[fIdx];
  d.customer_name=document.getElementById('fcname').value;
  d.model_name   =document.getElementById('fmodel').value;
  d.model_color  =document.getElementById('fcolor').value;
  d.visit_date   =document.getElementById('fdate').value;
  d.service_type =document.getElementById('fsvc').value;
  d.serial_no    =document.getElementById('fsno').value;
  d.prod_date    =document.getElementById('fprod').value;
  d.cs_number    =document.getElementById('fcs').value;
  d.problem      =document.getElementById('fprob').value;
  d.special_notes=document.getElementById('fnotes').value;
  d.time_required=document.getElementById('ftime').value;
  d.worker       =document.getElementById('fwrk').value;
  for(let i=0;i<10;i++){d.parts[i].name=document.getElementById('pn'+i).value; d.parts[i].note=document.getElementById('po'+i).value;}
}
function nextF(){saveF(); if(fIdx<fList.length-1){fIdx++;renderForm(fIdx);window.scrollTo(0,0);}else{genAll();}}
function prevF(){if(!fIdx)return; saveF();fIdx--;renderForm(fIdx);window.scrollTo(0,0);}

// ── JPG 생성 ──
async function genAll(){
  toast('JPG 생성 중...'); show('s-export');
  document.getElementById('hs').textContent='STEP 3/3';
  document.getElementById('el').innerHTML='<p style="color:var(--ts);font-size:14px;padding:8px">생성 중...</p>';
  const tmpl=await loadImg(B64); blobs=[];
  const res=[];
  for(const d of fList){
    const blob=await renderJPG(tmpl,d);
    const fn=fname(d), url=URL.createObjectURL(blob);
    blobs.push({fn,url,blob}); res.push({fn,url});
  }
  const el=document.getElementById('el'); el.innerHTML='';
  res.forEach(r=>{
    const div=document.createElement('div'); div.className='ei';
    div.innerHTML=`<span>🖼️</span><span class="fn">${esc(r.fn)}</span><a href="${r.url}" download="${esc(r.fn)}">⬇ 저장</a>`;
    el.appendChild(div);
  });
  toast('✅ 모든 JPG 생성 완료!');
}

async function renderJPG(tmpl, d){
  const cv=document.getElementById('cv'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.drawImage(tmpl,0,0,W,H);

  function dt(text, cfg){
    if(!text) return;
    ctx.font=`bold ${cfg.size}px 'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif`;
    ctx.fillStyle=cfg.color||'#000';
    ctx.textAlign=cfg.align||'left';
    ctx.textBaseline='middle';
    ctx.fillText(text, cfg.x, cfg.y, cfg.maxW);
  }

  const mfull=d.model_color?`${d.model_name} ${d.model_color}`:d.model_name;
  dt(d.customer_name, F.customer_name);
  dt(mfull,           F.model_name);
  dt(d.visit_date,    F.visit_date);
  dt(d.service_type,  F.service_type);
  dt(d.serial_no,     F.serial_no);
  dt(d.prod_date,     F.prod_date);
  dt(d.cs_number,     F.cs_number);
  dt(d.problem,       F.problem);
  dt(d.time_required, F.time_required);
  dt(d.worker,        F.worker);

  // 특이사항 줄바꿈
  if(d.special_notes){
    ctx.font=`bold ${F.special_notes.size}px 'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif`;
    ctx.fillStyle='#000'; ctx.textAlign='left'; ctx.textBaseline='middle';
    d.special_notes.split('\n').forEach((ln,li)=>{
      ctx.fillText(ln, F.special_notes.x, F.special_notes.y+li*34, F.special_notes.maxW);
    });
  }

  // 교체 내역
  for(let i=0;i<10;i++){
    const y=PY[i]; if(!y) continue;
    ctx.font=`bold ${PSZ}px 'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif`;
    ctx.textBaseline='middle';
    if(d.parts[i]?.name){ctx.fillStyle='#000';ctx.textAlign='center';ctx.fillText(d.parts[i].name,PNX,y,PNMW);}
    if(d.parts[i]?.note){ctx.fillStyle='#000';ctx.textAlign='center';ctx.fillText(d.parts[i].note,PNOX,y,PNOMW);}
  }
  return new Promise(r=>cv.toBlob(r,'image/jpeg',0.95));
}

function fname(d){
  const dt=d.visit_date.replace(/-/g,'');
  return `${dt}_${d.customer_name||'unknown'}_${d.service_type||'AS'}.jpg`;
}

async function dlAll(){for(const f of blobs){const a=document.createElement('a');a.href=f.url;a.download=f.fn;a.click();await sleep(400);}}

function gf(url){return fetch(url,{headers:{Authorization:`Bearer ${tok}`}});}
function loadImg(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});}
function show(id){document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');window.scrollTo(0,0);}
function toast(msg,dur=2800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),dur);}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function goBack(){show('s-sheets');document.getElementById('hs').textContent='STEP 1/3';}
</script>
