<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>방문AS 접수증</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--primary:#1a73e8;--pd:#1557b0;--s:#fff;--s2:#f8f9fa;--bd:#e0e0e0;--tx:#202124;--ts:#5f6368;--rad:12px;--sh:0 2px 8px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:#f0f4f8;color:var(--tx);min-height:100vh}
.hdr{background:var(--primary);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.hdr h1{font-size:17px;font-weight:600}
.hdr .sl{font-size:12px;opacity:.85;}
.hdr button{padding:6px 12px;border-radius:6px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:12px;cursor:pointer;font-weight:500;transition:all .15s}
.hdr button:hover{background:rgba(255,255,255,0.3)}
.sc{display:none;padding:20px;max-width:640px;margin:0 auto}
#s-stats{max-width:none;padding:15px}
#s-stats .card{padding:15px;margin-bottom:12px}
.sc.on{display:block}
.card{background:var(--s);border-radius:var(--rad);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
.ct{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:8px;font-size:15px;font-weight:500;border:none;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.97)}
.bp{background:var(--primary);color:#fff;width:100%}
.bp:hover{background:var(--pd)}
.bs{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.bo{background:transparent;color:var(--primary);border:2px solid var(--primary);width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}
label{display:block;font-size:13px;font-weight:500;color:var(--ts);margin-bottom:5px}
input,select,textarea{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:8px;font-size:15px;font-family:inherit;background:var(--s);color:var(--tx);transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary)}
textarea{resize:vertical;min-height:70px}
.fr{display:grid;gap:12px;margin-bottom:12px}
.fr.c2{grid-template-columns:1fr 1fr}
.fg{margin-bottom:12px}
.pt{width:100%;border-collapse:collapse}
.pt th{background:var(--s2);padding:8px 6px;font-size:12px;font-weight:600;text-align:center;border:1px solid var(--bd)}
.pt td{padding:4px;border:1px solid var(--bd);vertical-align:middle}
.pt td:first-child{text-align:center;font-weight:600;font-size:13px;color:var(--ts);width:36px}
.pt input{border:none;padding:7px 6px;font-size:14px;border-radius:0}
.pt input:focus{background:#e8f0fe;border-radius:4px}
.preset-btn{padding:5px 12px;border-radius:16px;font-size:13px;font-weight:500;border:1.5px solid var(--primary);background:#fff;color:var(--primary);cursor:pointer;white-space:nowrap;transition:all .15s;}
.preset-btn:hover{background:var(--primary);color:#fff;}
.preset-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:16px;font-size:13px;background:#e8f0fe;color:var(--primary);border:1.5px solid #c5d8f8;}
.preset-chip button{background:none;border:none;cursor:pointer;padding:0;color:#888;font-size:14px;line-height:1;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:#fff;border-radius:16px;padding:24px;width:92%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px;}
.prow{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center;}
.prow input{padding:7px 10px;font-size:14px;}
.si{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--bd);border-radius:8px;margin-bottom:8px;cursor:pointer;background:var(--s)}
.si:hover{border-color:var(--primary)}
.si.on{border-color:var(--primary);background:#e8f0fe}
.si input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary);flex-shrink:0}
.pb{height:4px;background:var(--bd);border-radius:2px;margin-bottom:20px;overflow:hidden}
.pf{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}
.pi{text-align:center;font-size:13px;color:var(--ts);margin-bottom:16px}
.sb{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px}
.s유상{background:#fce8e6;color:#c5221f}
.s무상{background:#e6f4ea;color:#137333}
.s재인입{background:#fef7e0;color:#b06000}
.ei{display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;background:var(--s2);margin-bottom:8px;border:1px solid var(--bd)}
.ei .fn{font-size:13px;flex:1;word-break:break-all}
.ei a{color:var(--primary);font-size:13px;font-weight:500;text-decoration:none;white-space:nowrap}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#323232;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;transition:transform .3s;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.on{transform:translateX(-50%) translateY(0)}
.lc{min-height:calc(100vh - 60px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.sp{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.dbg{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px;font-size:11px;font-family:monospace;max-height:200px;overflow-y:auto;margin-top:8px;white-space:pre-wrap;word-break:break-all;display:none}
.pt td {position: relative;}
.part-delete-btn {position: absolute;right: 4px;top: 50%;transform: translateY(-50%);width: 22px;height: 22px;background: #fff;border: 1px solid #ddd;border-radius: 50%;color: #999;font-size: 12px;font-weight: bold;cursor: pointer;display: flex;align-items: center;justify-content: center;opacity: 0;transition: opacity 0.2s ease;box-shadow: 0 1px 2px rgba(0,0,0,0.1);z-index: 10;}
.part-delete-btn:hover {background: #ff4444;color: white;border-color: #ff4444;}
.pt tr:hover .part-delete-btn {opacity: 1;}
.pt td:last-child {padding-right: 32px;position: relative;}
.img-grid {display: grid;grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));gap: 12px;margin-top: 15px;}
.modal-view {display: none;position: fixed;inset: 0;background: rgba(0,0,0,0.9);z-index: 1000;align-items: center;justify-content: center;cursor: zoom-out;}
.modal-view.on { display: flex; }
.modal-view img { max-width: 95%; max-height: 95%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
.download-link {font-size: 11px;color: var(--primary);text-decoration: underline;cursor: pointer;word-break: break-all;margin-top: 4px;line-height: 1.2;}

/* 통계 화면 스타일 */
.stat-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-box{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:16px;border-radius:12px;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.stat-box.paid{background:linear-gradient(135deg,#f093fb 0%,#f5576c 100%)}
.stat-box.free{background:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)}
.stat-box.reentry{background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%)}
.stat-box .num{font-size:32px;font-weight:700;margin-bottom:4px}
.stat-box .label{font-size:13px;opacity:.9}
.stat-table{width:100%;border-collapse:collapse;margin-top:12px}
.stat-table th{background:var(--s2);padding:10px 8px;font-size:13px;font-weight:600;text-align:left;border-bottom:2px solid var(--bd)}
.stat-table td{padding:10px 8px;border-bottom:1px solid var(--bd);font-size:14px}
.stat-table tr:hover{background:#f8f9fa}
.stat-table .date-col{font-weight:600;color:var(--primary)}
.month-tab{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;border-radius:8px;border:1.5px solid var(--bd);background:var(--s);cursor:pointer;font-size:14px;font-weight:500;margin:0 4px 8px 0;transition:all .15s}
.month-tab:hover{border-color:var(--primary);background:#e8f0fe}
.month-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
/* 펼침/접기 테이블 */
.expand-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}
.expand-table thead{background:var(--s2)}
.expand-table thead tr th{padding:8px;font-size:12px;font-weight:600;border:1px solid var(--bd);text-align:center}
.expand-table .summary-row{background:#fff;cursor:pointer;user-select:none;font-size:12px}
.expand-table .summary-row:hover{background:#f5f9ff}
.expand-table .summary-row td{padding:8px;border:1px solid var(--bd);text-align:center;height:28px;vertical-align:middle}
.expand-table .summary-row td:nth-child(1){text-align:center;width:5%}
.expand-table .summary-row td:nth-child(2){text-align:center;width:15%;font-weight:500}
.expand-table .summary-row td:nth-child(3){text-align:center;width:8%}
.expand-table .summary-row td:nth-child(4){text-align:left;width:22%;padding-left:12px}
.expand-table .summary-row td:nth-child(5){text-align:center;width:8%}
.expand-table .summary-row td:nth-child(6){text-align:left;width:22%;padding-left:12px}
.expand-table .summary-row td:nth-child(7){text-align:center;width:10%}
.expand-table .detail-row{display:none}
.expand-table .detail-row.show{display:table-row}
.expand-table .detail-row td{padding:0;background:#fff;border:1px solid var(--bd)}
.expand-table .detail-row td table{width:100%;border-collapse:collapse;font-size:11px}
.expand-table .detail-row td table thead tr{background:#f8f9fa}
.expand-table .detail-row td table thead th{padding:6px;font-size:11px;font-weight:600;border-bottom:1px solid var(--bd);text-align:left}
.expand-table .detail-row td table tbody tr{border-bottom:1px solid #eee}
.expand-table .detail-row td table tbody td{padding:5px 6px;text-align:left}
.expand-toggle{display:inline-block;width:14px;text-align:center;font-size:11px;color:var(--primary);font-weight:bold}
.expand-table .summary-row.expanded{background:#e8f0fe}
.expand-table tbody tr:last-child td{font-weight:600;background:#f5f5f5;border:1px solid var(--bd)}
</style>
</head>
<body>
<div id="modalView" class="modal-view" onclick="this.classList.remove('on')"><img id="modalImg" src=""></div>  
<div class="hdr">
  <span>📋</span>
  <h1 style="cursor:pointer" onclick="goToHome()" title="처음 화면으로">방문AS 접수증</h1>
  <button onclick="showStats()" style="margin-left:auto">📊 통계</button>
  <span class="sl" id="hs"></span>
</div>
<div class="toast" id="toast"></div>

<!-- 로그인 -->
<div class="sc on" id="s-login">
<div class="lc">
  <div style="font-size:48px;margin-bottom:16px">🔧</div>
  <div style="font-size:22px;font-weight:700;margin-bottom:8px">방문AS 접수증</div>
  <div style="font-size:14px;color:var(--ts);margin-bottom:32px;line-height:1.6">Google 계정으로 로그인하세요</div>
  <div class="card" style="width:100%;text-align:left;margin-bottom:20px">
    <div class="ct">📊 스프레드시트</div>
    <div class="fg">
      <label>구글 시트 URL 또는 ID</label>
      <input type="text" id="ssid" placeholder="시트 주소 전체 또는 ID만 붙여넣기">
      <p style="font-size:12px;color:var(--ts);margin-top:6px">전체 URL을 그대로 붙여넣어도 됩니다</p>
    </div>
  </div>
  <button class="btn bp" onclick="doLogin()" id="lbtn">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFF" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
    Google로 로그인
  </button>
  <div style="position:fixed;bottom:20px;right:20px;font-size:11px;color:#999;text-align:right;line-height:1.4;pointer-events:none">
    <div data-version></div>
    <div data-update-date></div>
  </div>
</div>
</div>

<!-- 시트 선택 -->
<div class="sc" id="s-sheets">
<div class="card">
  <div class="ct">📊 시트 선택</div>
  <p style="font-size:13px;color:var(--ts);margin-bottom:14px">오늘 방문할 고객을 선택하세요</p>
  <div id="sheetList"></div>
  <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;color:var(--ts)">선택: <b id="cnt">0</b>개</span>
    <div style="display:flex;gap:8px">
      <button class="btn bs" style="padding:8px 14px;font-size:13px" onclick="selAll()">전체선택</button>
      <button class="btn bs" style="padding:8px 14px;font-size:13px" onclick="selNone()">전체해제</button>
    </div>
  </div>
</div>
<button class="btn bp" onclick="goForms()">다음 →</button>
</div>

<!-- 폼 입력 -->
<div class="sc" id="s-forms">
<div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
<div class="pi" id="pi"></div>
<div id="fc"></div>
<div style="display:flex;gap:10px;margin-top:8px">
  <button class="btn bs" style="flex:1" onclick="prevF()">← 이전</button>
  <button class="btn bp" style="flex:2" id="nfb" onclick="nextF()">다음 →</button>
</div>
</div>

<!-- 내보내기 -->
<div class="sc" id="s-export">
<div class="card">
  <div class="ct">🎉 JPG 생성 완료</div>
  <div id="exportStats" style="font-size:14px;font-weight:600;color:var(--primary);margin-bottom:14px;padding:10px 14px;background:#e8f0fe;border-radius:8px;"></div>
  <div id="el"></div>
</div>
<button class="btn bp" style="margin-bottom:10px" onclick="dlAll()">
  📦 ZIP으로 한번에 다운로드
</button>
<button class="btn bs" onclick="goBack()">← 처음으로</button>
</div>

<!-- 통계 화면 -->
<div class="sc" id="s-stats">
<div class="card">
  <div class="ct">📊 작업 통계</div>
  <div id="statsSummary" class="stat-summary"></div>
</div>

<!-- 검색 및 필터 -->
<div class="card">
  <div class="ct" style="font-size:14px">🔍 검색 및 필터</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
    <div>
      <label style="font-size:12px">기간</label>
      <select id="filterPeriod" style="width:100%;padding:8px;font-size:13px;border:1px solid var(--bd);border-radius:6px" onchange="updateStatsView()">
        <option value="all">전체</option>
        <option value="thisMonth">이번달</option>
        <option value="lastMonth">지난달</option>
        <option value="thisYear">올해</option>
        <option value="lastYear">작년</option>
      </select>
    </div>
    <div>
      <label style="font-size:12px">유무상</label>
      <select id="filterType" style="width:100%;padding:8px;font-size:13px;border:1px solid var(--bd);border-radius:6px" onchange="updateStatsView()">
        <option value="">전체</option>
        <option value="유상">유상</option>
        <option value="무상">무상</option>
        <option value="재인입">재인입</option>
      </select>
    </div>
  </div>
  <div style="margin-bottom:12px">
    <label style="font-size:12px">검색어</label>
    <input type="text" id="searchKeyword" placeholder="고객명, 문제점, CS번호 등으로 검색..." style="width:100%;padding:8px;font-size:13px;border:1px solid var(--bd);border-radius:6px" onkeyup="updateStatsView()">
  </div>
  <button class="btn bs" style="width:100%;padding:6px;font-size:12px" onclick="clearFilters()">초기화</button>
</div>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div class="ct" style="margin:0">📅 월별 내역</div>
    <div style="display:flex;gap:6px">
      <button class="btn bs" style="padding:6px 10px;font-size:12px" onclick="downloadStatsSummary()">📥 수리내역</button>
      <button class="btn bs" style="padding:6px 10px;font-size:12px" onclick="downloadServicesDetail()">📥 서비스고객</button>
    </div>
  </div>
  <div id="monthTabs" style="margin-bottom:16px"></div>
  <div id="statsTable"></div>
</div>

<button class="btn bs" onclick="goBackFromStats()">← 이전</button>
</div>

<!-- 통계 편집 모달 -->
<div class="modal-bg" id="editStatModal">
  <div class="modal">
    <h3>📊 통계 편집</h3>
    <div class="fg"><label>날짜</label><input type="date" id="editStatDate"></div>
    <div class="fr c2">
      <div><label>총합</label><input type="number" id="editStatTotal" min="0"></div>
      <div><label>유상</label><input type="number" id="editStatPaid" min="0"></div>
    </div>
    <div class="fr c2">
      <div><label>무상</label><input type="number" id="editStatFree" min="0"></div>
      <div><label>재인입</label><input type="number" id="editStatReentry" min="0"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button onclick="saveEditedStat()" class="btn bp" style="flex:1">저장</button>
      <button onclick="closeEditStatModal()" class="btn bs" style="flex:1">취소</button>
      <button onclick="deleteEditingStat()" class="btn bs" style="flex:1;background:#ffebee;color:#c5221f" id="delBtn">삭제</button>
    </div>
  </div>
</div>

<!-- 세트 관리 모달 -->
<div class="modal-bg" id="presetModal">
  <div class="modal">
    <h3>🗂️ 부품 세트 관리</h3>
    <p style="font-size:13px;color:var(--ts);margin-bottom:14px">세트 이름과 부품명/비고 쌍을 입력하세요. 최대 10줄.</p>
    <div class="fg"><label>세트 이름</label><input type="text" id="psetName" placeholder="예: 기어 교체 세트"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:6px;padding:0 2px">
      <span style="font-size:12px;font-weight:600;color:var(--ts)">부품명</span>
      <span style="font-size:12px;font-weight:600;color:var(--ts)">비고</span>
      <span></span>
    </div>
    <div id="psetRows"></div>
    <button onclick="addPsetRow()" style="margin-top:8px;margin-bottom:16px;padding:7px 14px;border-radius:8px;font-size:13px;background:var(--s2);border:1px solid var(--bd);cursor:pointer;">+ 줄 추가</button>
    <div style="display:flex;gap:8px">
      <button onclick="savePreset()" class="btn bp" style="flex:1">저장</button>
      <button onclick="closePresetModal()" class="btn bs" style="flex:1">취소</button>
    </div>
  </div>
</div>

<canvas id="cv" style="display:none"></canvas>
<script>
const W=1414, H=2000;
const SCOPE='https://www.googleapis.com/auth/spreadsheets.readonly';
const APP_VERSION = '1.2.4'; // ← 버전 업데이트 시 여기만 수정하세요
const UPDATE_DATE = '2026-04-09';

const F = {
  customer_name: {x:270,  y:310, size:32, align:'left',   maxW:470, color:'#000'},
  model_name:    {x:901,  y:310, size:28, align:'center', maxW:285, color:'#000'},
  visit_date:    {x:1248, y:310, size:26, align:'center', maxW:185, color:'#000'},

function saveStats(stats, date, detailList) {
  try {
    const allStats = JSON.parse(localStorage.getItem('as_daily_stats') || '{}');
    allStats[date] = {
      date: date,
      total: stats.total || 0,
      유상: stats.유상 || 0,

      재인입: stats.재인입 || 0,
      기타: stats.기타 || 0,
      유상_workers: stats.유상_workers || [],
      무상_workers: stats.무상_workers || [],
      재인입_workers: stats.재인입_workers || [],
      details: detailList || [],
      timestamp: new Date().getTime()
    };
    localStorage.setItem('as_daily_stats', JSON.stringify(allStats));
    console.log('통계 저장 완료:', date, stats);
  } catch(e) {
    console.error('통계 저장 실패:', e);
  }
}

function getAllStats() {
  try {
    return JSON.parse(localStorage.getItem('as_daily_stats') || '{}');
  } catch(e) {
    return {};
  }
}

function getMonthlyStats(year, month) {
  const allStats = getAllStats();
  const prefix = `${year}-${String(month).padStart(2,'0')}`;
  const monthly = {};
  
  Object.keys(allStats).forEach(date => {
    if(date.startsWith(prefix)) {
      monthly[date] = allStats[date];
    }
  });
  
  return monthly;
}

function getTotalStats(statsObj) {
  const total = {total:0, 유상:0, 무상:0, 재인입:0, 기타:0};
  Object.values(statsObj).forEach(s => {
    total.total += s.total || 0;
    total.유상 += s.유상 || 0;
    total.무상 += s.무상 || 0;
    total.재인입 += s.재인입 || 0;
    total.기타 += s.기타 || 0;
  });
  return total;
}

function filterStatsByPeriod(allStats, period) {
  const now = new Date();
  const filtered = {};
  
  Object.keys(allStats).forEach(dateStr => {
    const [year, month, day] = dateStr.split('-').map(Number);
    const date = new Date(year, month - 1, day);
    const currentYear = now.getFullYear();
    const currentMonth = now.getMonth() + 1;
    
    let include = false;
    if(period === 'all') {
      include = true;
    } else if(period === 'thisMonth') {
      include = year === currentYear && month === currentMonth;
    } else if(period === 'lastMonth') {
      let prevMonth = currentMonth - 1;
      let prevYear = currentYear;
      if(prevMonth <= 0) { prevMonth = 12; prevYear--; }
      include = year === prevYear && month === prevMonth;
    } else if(period === 'thisYear') {
      include = year === currentYear;
    } else if(period === 'lastYear') {
      include = year === currentYear - 1;
    }
    
    if(include) filtered[dateStr] = allStats[dateStr];
  });
  
  return filtered;
}

function doLogin(){
  cId = FIXED_CLIENT_ID;
  const raw = document.getElementById('ssid').value.trim();
  if(!raw){toast('스프레드시트 URL/ID를 입력해주세요');return;}
  const m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  ssId = m ? m[1] : raw.replace(/[^a-zA-Z0-9_-]/g,'');
  if(!ssId){toast('올바른 시트 URL 또는 ID를 입력해주세요');return;}
  if(typeof google==='undefined'||!google.accounts){toast('Google 라이브러리 로딩 중... 잠시 후 다시 시도');return;}
  localStorage.setItem('as_ssid', ssId);
  const b=document.getElementById('lbtn');
  b.innerHTML='<span class="sp"></span> 로그인 중...'; b.disabled=true;
  google.accounts.oauth2.initTokenClient({
    client_id:cId, scope:SCOPE,
    callback:async(r)=>{
      if(r.error){toast('로그인 실패: '+r.error);b.innerHTML='Google로 로그인';b.disabled=false;return;}
      tok=r.access_token; await loadSheets();
    }
  }).requestAccessToken();
}

async function loadSheets(){
  try{
    const r=await gf(`https://sheets.googleapis.com/v4/spreadsheets/${ssId}?fields=sheets.properties`);
    const d=await r.json();
    if(d.error) throw new Error(d.error.message);
    sheetsData=d.sheets.map(s=>({
      title: s.properties.title,
      color: s.properties.tabColor||s.properties.tabColorStyle?.rgbColor||null
    }));
    sheets=sheetsData.map(s=>s.title);
    renderList(); show('s-sheets');
    document.getElementById('hs').textContent='STEP 1/3';
    toast(`시트 ${sheets.length}개 로드 완료`);
  }catch(e){
    toast('시트 로딩 실패: '+e.message);
    const b=document.getElementById('lbtn');
    b.innerHTML='Google로 로그인'; b.disabled=false;
  }
}

let dragStart=-1, dragMode=null;
function renderList(){
  const c=document.getElementById('sheetList'); c.innerHTML='';
  sheetsData.forEach((s,i)=>{
    const col=s.color;
    const tabCss=col
      ? `background:rgba(${Math.round((col.red||0)*255)},${Math.round((col.green||0)*255)},${Math.round((col.blue||0)*255)},0.18);border-left:4px solid rgb(${Math.round((col.red||0)*255)},${Math.round((col.green||0)*255)},${Math.round((col.blue||0)*255)})`
      : '';
    const dot=col
      ? `<span style="width:10px;height:10px;border-radius:50%;background:rgb(${Math.round((col.red||0)*255)},${Math.round((col.green||0)*255)},${Math.round((col.blue||0)*255)});flex-shrink:0;display:inline-block"></span>`
      : '';
    const d=document.createElement('div');
    d.className='si'; d.id='si'+i;
    d.style.cssText=tabCss;
    d.innerHTML=`<input type="checkbox" id="ck${i}">
      ${dot}
      <label for="ck${i}" style="margin:0;font-size:15px;font-weight:500;cursor:pointer;flex:1;user-select:none">${esc(s.title)}</label>`;

    d.addEventListener('mousedown', e=>{
      if(e.target.tagName==='INPUT') return;
      e.preventDefault();
      const ck=document.getElementById('ck'+i);
      dragMode = ck.checked ? 'uncheck' : 'check';
      dragStart=i;
      ck.checked = dragMode==='check';
      updCnt();
    });
    d.addEventListener('mouseover', e=>{
      if(dragStart===-1) return;
      const ck=document.getElementById('ck'+i);
      ck.checked = dragMode==='check';
      updCnt();
    });
    d.addEventListener('touchstart', e=>{
      const ck=document.getElementById('ck'+i);
      dragMode = ck.checked ? 'uncheck' : 'check';
      dragStart=i;
      ck.checked = dragMode==='check';
      updCnt();
    }, {passive:true});
    d.addEventListener('touchmove', e=>{
      if(dragStart===-1) return;
      const touch=e.touches[0];
      const el=document.elementFromPoint(touch.clientX, touch.clientY);
      if(el){
        const si=el.closest('.si');
        if(si){
          const idx=parseInt(si.id.replace('si',''));
          if(!isNaN(idx)){
            document.getElementById('ck'+idx).checked = dragMode==='check';
            updCnt();
          }
        }
      }
    }, {passive:true});
    d.addEventListener('click', e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='LABEL') return;
      const ck=document.getElementById('ck'+i);
      ck.checked=!ck.checked; updCnt();
    });
    c.appendChild(d);
  });
  if(!document._dragEndSet){
    document._dragEndSet=true;
    document.addEventListener('mouseup',  ()=>{dragStart=-1;dragMode=null;});
    document.addEventListener('touchend', ()=>{dragStart=-1;dragMode=null;});
  }
  updCnt();
}

async function goForms(){

  if(!checked.length){toast('시트를 1개 이상 선택해주세요');return;}
  selSheets=checked.map(c=>sheets[parseInt(c.id.replace('ck',''))]);
  toast('데이터 불러오는 중...');
  try{
    const ranges=selSheets.map(n=>`${encodeURIComponent(n)}!A3:J27`);
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${ssId}/values:batchGet?`
      +ranges.map(r=>`ranges=${r}`).join('&')+'&valueRenderOption=FORMATTED_VALUE';
    const res=await gf(url);
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    data.valueRanges.forEach((vr,i)=>{sdMap[selSheets[i]]=vr.values||[];});
    buildForms(); fIdx=0; renderForm(0);
    show('s-forms'); document.getElementById('hs').textContent='STEP 2/3';

function buildForms(){
  const today=new Date();
  const td=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  fList=selSheets.map(name=>{
    const rows=sdMap[name]||[];
    let r_cust=[], r_svc=[], r_cs=[];
    let partsStart=-1, notesStart=-1;
    for(let i=0;i<rows.length;i++){
      const r=rows[i];
      const a=(r[0]||'').trim();
      if(a==='고객명' && (r[1]||'').trim() && (r[1]||'').trim()!=='고객명') { r_cust=r; }
      if(['유상','무상','재인입'].includes(a) || r.some(c=>(c||'').toString().includes('Sr.No'))) {
        if(['유상','무상','재인입'].includes(a) || (r[5]||'').trim()) { r_svc=r; }
      }
      if(a==='CS번호') { r_cs=r; }
      if((r[1]||'').trim()==='NO' && partsStart===-1) { partsStart=i+1; }
      if(a==='특이사항' && notesStart===-1) { notesStart=i+1; }
    }
    const customer_name=(r_cust[1]||'').trim();
    const model_name=(r_cust[4]||'').trim();
    const visit_date=(r_cust[7]||r_cust[8]||'').trim()||td;
    const service_type=(r_svc[0]||'').trim();
    let serial_no='';
    for(let j=0;j<r_svc.length;j++){ if((r_svc[j]||'').toString().includes('Sr.No')){ serial_no=(r_svc[j+1]||'').toString().trim(); break; } }
    let prod_date='';
    for(let j=0;j<r_svc.length;j++){ if((r_svc[j]||'').toString().includes('생산일')){ prod_date=(r_svc[j+1]||'').toString().trim(); break; } }
    const cs_number=(r_cs[1]||'').trim();
    let problem='';
    for(let j=0;j<r_cs.length;j++){ if((r_cs[j]||'').toString().includes('문제점')){ for(let k=j+1;k<r_cs.length;k++){ const v=(r_cs[k]||'').trim(); if(v){problem=v;break;} } break; } }
    if(!problem) problem=(r_cs[4]||r_cs[5]||r_cs[6]||'').trim();
    const parts=[];
    if(partsStart>-1){
      for(let i=0;i<10;i++){ const pr=rows[partsStart+i]||[]; parts.push({name:(pr[1]||'').trim(), note:(pr[3]||'').trim()}); }
    } else { for(let i=0;i<10;i++) parts.push({name:'',note:''}); }
    let special_notes='';
    if(notesStart>-1){ const n1=((rows[notesStart]||[]).slice(0).join(' ')).trim(); const n2=((rows[notesStart+1]||[]).slice(0).join(' ')).trim(); special_notes=[n1,n2].filter(Boolean).join('\n'); }
    return {sheet_name:name,customer_name,model_name,model_color:'',visit_date,service_type,serial_no,prod_date,cs_number,problem,parts,special_notes,time_required:'30',worker:'정수호'};
  });
}

function deletePartRow(rowIdx) {
  const d = fList[fIdx];
  if (!d || !d.parts) return;
  let tempParts = [];
  for (let i = 0; i < 10; i++) {
    const nameVal = document.getElementById('pn' + i)?.value || '';
    const noteVal = document.getElementById('po' + i)?.value || '';
    tempParts.push({ name: nameVal, note: noteVal });
  }
  tempParts.splice(rowIdx, 1);
  while (tempParts.length < 10) {
    tempParts.push({ name: '', note: '' });
  }
  d.parts = tempParts;
  for (let i = 0; i < 10; i++) {
    const nameEl = document.getElementById('pn' + i);
    const noteEl = document.getElementById('po' + i);
    if (nameEl) nameEl.value = d.parts[i].name;
    if (noteEl) noteEl.value = d.parts[i].note;
  }
  toast(`${rowIdx + 1}번 항목이 삭제되고 아래 항목들이 정렬되었습니다.`);
}

function dlImagesDirectly() {

    toast('이미지를 순차적으로 다운로드합니다...');

            a.download = f.fn;
            document.body.appendChild(a);

            document.body.removeChild(a);

    });
}

function showZoom(url) {
    const m = document.getElementById('modalView');
    document.getElementById('modalImg').src = url;
    m.classList.add('on');
}

async function genAll(){
  if(!templateImage || !templateImage.complete) {
    toast('이미지 템플릿 로딩 중...'); return;
  }
  
  toast('JPG 생성 중...');
  show('s-export');
  document.getElementById('hs').textContent='STEP 3/3';
  const el = document.getElementById('el');
  el.innerHTML = '<p style="color:var(--ts);font-size:14px;padding:8px">생성 중...</p>';
  
  blobs = [];
  for(let idx = 0; idx < fList.length; idx++){
    const d = fList[idx];
    const blob = await renderJPG(templateImage, d);
    const fn = fname(d, idx);
    const url = URL.createObjectURL(blob);
    blobs.push({fn, url, blob});
  }
  
  el.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'img-grid';
  
  blobs.forEach(r => {
    const cell = document.createElement('div');
    cell.style.textAlign = 'center';
    
    const img = document.createElement('img');
    img.src = r.url;
    img.style.cssText = 'width:100%; aspect-ratio:0.707; object-fit:cover; border-radius:4px; border:1px solid var(--bd); cursor:zoom-in;';
    img.onclick = () => showZoom(r.url);
    
    const label = document.createElement('div');
    label.className = 'download-link';
    label.textContent = r.fn.replace(/^\d{8}_/,''); 
    label.onclick = (e) => {
        e.stopPropagation();
        const a = document.createElement('a');
        a.href = r.url;
        a.download = r.fn;
        a.click();
    };
    
    cell.appendChild(img);
    cell.appendChild(label);
    grid.appendChild(cell);
  });
  el.appendChild(grid);

  const btnArea = document.querySelector('#s-export .card');
  if (!document.getElementById('btnDirect')) {
      const btn = document.createElement('button');
      btn.id = 'btnDirect';
      btn.className = 'btn bo';
      btn.style.cssText = 'margin-bottom:10px; width:100%;';
      btn.innerHTML = '📂 이미지 한꺼번에 저장 (ZIP 없음)';
      btn.onclick = dlImagesDirectly;
      btnArea.insertBefore(btn, el);
  }
  
  // 통계 계산 및 저장
  const stats = {total: fList.length, 유상_workers: [], 무상_workers: [], 재인입_workers: []};
  const detailList = [];
  
  fList.forEach(d=>{ 
    const k = d.service_type||'기타'; 
    stats[k] = (stats[k]||0)+1;
    // 작업자 정보 수집
    if(k === '유상') stats.유상_workers.push(d.customer_name||'미정');
    else if(k === '무상') stats.무상_workers.push(d.customer_name||'미정');
    else if(k === '재인입') stats.재인입_workers.push(d.customer_name||'미정');
    
    // 부품명 추출 (비어있지 않은 부품들만)
    const partNames = d.parts.filter(p => p.name && p.name.trim()).map(p => p.name.trim());
    
    // 상세 정보 수집
    detailList.push({
      customer_name: d.customer_name || '',
      model_name: d.model_name || '',
      service_type: k,
      serial_no: d.serial_no || '',
      prod_date: d.prod_date || '',
      cs_number: d.cs_number || '',
      problem: d.problem || '',
      parts: partNames.join(', ')
    });
  });
  
  // 중복 제거
  stats.유상_workers = [...new Set(stats.유상_workers)];
  stats.무상_workers = [...new Set(stats.무상_workers)];
  stats.재인입_workers = [...new Set(stats.재인입_workers)];
  
  const statMsg = Object.entries(stats)
    .filter(([k]) => k !== 'total' && !k.includes('_workers'))
    .map(([k,v])=>`${k} ${v}건`)
    .join(' · ');
  
  document.getElementById('exportStats').textContent = `총 ${fList.length}건 — ${statMsg}`;
  
  // 오늘 날짜로 통계 저장
  const today = new Date();
  const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  saveStats(stats, dateStr, detailList);
  
  toast(`✅ 완료! ${statMsg}`);
}

async function renderJPG(tmpl, d){
  const cv = document.getElementById('cv');
  cv.width = W;
  cv.height = H;
  const ctx = cv.getContext('2d');
  ctx.drawImage(tmpl, 0, 0, W, H);
  
  function dt(text, cfg){
    if(!text) return;
    ctx.font = `bold ${cfg.size}px 'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif`;
    ctx.fillStyle = cfg.color || '#000';
    ctx.textAlign = cfg.align || 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, cfg.x, cfg.y, cfg.maxW);
  }
  
  const mfull = d.model_color ? `${d.model_name} ${d.model_color}` : d.model_name;
  dt(d.customer_name, F.customer_name);
  dt(mfull, F.model_name);
  dt(d.visit_date, F.visit_date);
  dt(d.service_type, F.service_type);
  dt(d.serial_no, F.serial_no);
  dt(d.prod_date, F.prod_date);
  dt(d.cs_number, F.cs_number);
  dt(d.problem, F.problem);
  dt(d.time_required, F.time_required);
  dt(d.worker, F.worker);
  
  if(d.special_notes){
    ctx.font = `bold ${F.special_notes.size}px 'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif`;
    ctx.fillStyle = '#000';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    d.special_notes.split('\n').forEach((ln, li)=>{
      ctx.fillText(ln, F.special_notes.x, F.special_notes.y + li * 34, F.special_notes.maxW);
    });
  }
  
  for(let i = 0; i < 10; i++){
    const y = PY[i];
    if(!y) continue;
    ctx.font = `bold ${PSZ}px 'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif`;
    ctx.textBaseline = 'middle';
    if(d.parts[i]?.name){
      ctx.fillStyle = '#000';
      ctx.textAlign = 'center';
      ctx.fillText(d.parts[i].name, PNX, y, PNMW);
    }
    if(d.parts[i]?.note){
      ctx.fillStyle = '#000';
      ctx.textAlign = 'center';
      ctx.fillText(d.parts[i].note, PNOX, y, PNOMW);
    }
  }
  
  return new Promise(r => cv.toBlob(r, 'image/jpeg', 0.95));
}

function fname(d, idx){ 
  const dt = d.visit_date.replace(/-/g,''); 
  const seq = String(idx+1).padStart(2,'0'); 
  return `${seq}_${dt}_${d.customer_name||'unknown'}_${d.service_type||'AS'}.jpg`; 
}

function savePreset(){ 
  const name=document.getElementById('psetName').value.trim(); 
  if(!name){toast('세트 이름을 입력해주세요');return;} 
  const rows=[...document.querySelectorAll('#psetRows .prow')].map(r=>{ 
    const ins=r.querySelectorAll('input'); 
    return {n:ins[0].value.trim(), o:ins[1].value.trim()}; 
  }).filter(r=>r.n||r.o); 
  if(!rows.length){toast('부품을 1개 이상 입력해주세요');return;} 
  const presets=getPresets(); 
  if(editingPresetIdx>=0) presets[editingPresetIdx]={name,rows}; 
  else presets.push({name,rows}); 
  savePresets(presets); 
  closePresetModal(); 
  renderPresetChips(); 
  toast(`"${name}" 세트 저장 완료`); 
}
function deletePreset(idx){ 
  if(!confirm('이 세트를 삭제할까요?')) return; 
  const p=getPresets(); p.splice(idx,1); savePresets(p); 
  renderPresetChips(); 
}
function applyPreset(idx){ 
  const preset=getPresets()[idx]; 
  if(!preset) return; 
  let row=0; 
  for(let i=0;i<10&&row<preset.rows.length;i++){ 
    const nameEl=document.getElementById('pn'+i); 
    const noteEl=document.getElementById('po'+i); 
    if(nameEl && !nameEl.value.trim()){ 
      nameEl.value=preset.rows[row].n||''; 
      noteEl.value=preset.rows[row].o||''; 
      row++; 
    } 
  } 
  toast(`"${preset.name}" 적용 완료`); 
}
function clearParts(){ 
  for(let i=0;i<10;i++){ 
    const n=document.getElementById('pn'+i), o=document.getElementById('po'+i); 
    if(n) n.value=''; if(o) o.value=''; 
  } 
}
function renderPresetChips(){ 
  const c=document.getElementById('presetChips'); 
  if(!c) return; 
  const presets=getPresets(); 
  c.innerHTML=''; 
  if(!presets.length){ 
    c.innerHTML='<span style="font-size:12px;color:var(--ts)">저장된 세트 없음 — 오른쪽 버튼으로 추가하세요</span>'; 
    return; 
  } 
  presets.forEach((p,i)=>{ 
    const chip=document.createElement('div'); chip.className='preset-chip'; 
    chip.innerHTML=`<span style="cursor:pointer" onclick="applyPreset(${i})" title="클릭하면 적용">${esc(p.name)}</span><button onclick="openPresetModal(${i})" title="수정" style="color:var(--primary)">✎</button><button onclick="deletePreset(${i})" title="삭제">✕</button>`; 
    c.appendChild(chip); 
  }); 
}
async function dlAll(){ 
  if(!blobs.length){toast('생성된 파일이 없습니다');return;} 
  toast('ZIP 파일 생성 중...'); 
  const zip=new JSZip(); 
  for(const f of blobs){ 
    const ab=await f.blob.arrayBuffer(); 
    zip.file(f.fn, ab); 
  } 
  const zipBlob=await zip.generateAsync({type:'blob'}); 
  const today=new Date(); 
  const dt=`${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`; 
  const a=document.createElement('a'); 
  a.href=URL.createObjectURL(zipBlob); 
  a.download=`AS접수증_${dt}.zip`; 
  a.click(); 
  toast('✅ ZIP 다운로드 완료!'); 
}
function gf(url){return fetch(url,{headers:{Authorization:`Bearer ${tok}`}});}
function show(id){document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');window.scrollTo(0,0);}
function toast(msg,dur=2800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),dur);}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function goBack(){show('s-sheets');document.getElementById('hs').textContent='STEP 1/3';}
function goToHome(){show('s-sheets');document.getElementById('hs').textContent='STEP 1/3';}
function goBackFromStats(){show(lastScreenBeforeStats);if(lastScreenBeforeStats==='s-sheets'){document.getElementById('hs').textContent='STEP 1/3';}}
function openEditStatModal(date){editingStatDate=date;const allStats=getAllStats();const stat=allStats[date];if(!stat){toast('데이터를 찾을 수 없습니다');return;}document.getElementById('editStatDate').value=date;document.getElementById('editStatTotal').value=stat.total||0;document.getElementById('editStatPaid').value=stat.유상||0;document.getElementById('editStatFree').value=stat.무상||0;document.getElementById('editStatReentry').value=stat.재인입||0;document.getElementById('editStatModal').classList.add('on');}
function closeEditStatModal(){document.getElementById('editStatModal').classList.remove('on');editingStatDate=null;}
function saveEditedStat(){
  const newDate=document.getElementById('editStatDate').value;
  const allStats=getAllStats();
  if(!newDate){toast('날짜를 입력해주세요');return;}
  const paid=parseInt(document.getElementById('editStatPaid').value)||0;
  const free=parseInt(document.getElementById('editStatFree').value)||0;
  const reentry=parseInt(document.getElementById('editStatReentry').value)||0;
  const total=parseInt(document.getElementById('editStatTotal').value)||(paid+free+reentry);
  const oldData = allStats[editingStatDate];
  if(editingStatDate&&editingStatDate!==newDate&&allStats[editingStatDate]){delete allStats[editingStatDate];} 
  allStats[newDate]={
    date:newDate,
    total:total,
    유상:paid,
    무상:free,
    재인입:reentry,
    기타:0,
    유상_workers:oldData?.유상_workers||[],
    무상_workers:oldData?.무상_workers||[],
    재인입_workers:oldData?.재인입_workers||[],
    details:oldData?.details||[],
    timestamp:new Date().getTime()
  };
  localStorage.setItem('as_daily_stats',JSON.stringify(allStats));
  toast('통계가 수정되었습니다');
  closeEditStatModal();
  renderStatsScreen();
}
function deleteEditingStat(){if(!editingStatDate)return;if(!confirm(`${editingStatDate}의 데이터를 삭제할까요?`))return;const allStats=getAllStats();delete allStats[editingStatDate];localStorage.setItem('as_daily_stats',JSON.stringify(allStats));toast('데이터가 삭제되었습니다');closeEditStatModal();renderStatsScreen();}
</script>
